name: Oxlint and Vitest

on:
 pull_request:
  branches: [master, main]

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
  - uses: actions/checkout@v4
  - uses: oven-sh/setup-bun@v2
    with:
      bun-version: "latest"
  - run: bun i
  - name: Run oxlint
    run: bun run oxl:lint
  - name: Run vitest
    run: bun run test
